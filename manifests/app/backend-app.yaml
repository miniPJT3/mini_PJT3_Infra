apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend-app
  namespace: mini-project3
spec:
  project: default
  source:
    repoURL: https://github.com/miniPJT3/mini_PJT3_Infra.git
    targetRevision: HEAD
    path: manifests/backend  # 백엔드 소스가 있는 경로
  destination:
    server: https://kubernetes.default.svc
    namespace: mini-project3 # 앱이 배포될 네임스페이스
  syncPolicy:
    automated:
      prune: true
      selfHeal: true       