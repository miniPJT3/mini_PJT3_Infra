apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend-app
  namespace: mini-project3
spec:
  project: default
  source:
    repoURL: https://github.com/miniPJT3/mini_PJT3_Infra.git
    targetRevision: HEAD
    path: manifests/frontend # 실제 프론트 배포 파일이 있는 경로
  destination:
    server: https://kubernetes.default.svc
    namespace: mini-project3